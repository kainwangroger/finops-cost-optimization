name: CI -- FinOps Cost Optimization

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install ruff
      - run: ruff check src/ tests/

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install pytest
      - run: |
          PYTHONPATH=src pytest tests/test_collector.py tests/test_analytics.py tests/test_automation.py tests/test_forecasting.py tests/test_policies.py -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config -q

  integration:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, docker-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install pytest
      - run: |
          PYTHONPATH=src pytest tests/test_integration.py -v
